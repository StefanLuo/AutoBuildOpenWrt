name: build-rockchip-openwrt

on:
  workflow_dispatch:
    inputs:
      version:
        type: choice
        description: '输入OpenWrt版本，可选值如下：'
        options:
          - v24.10.7
          - v25.12.5
        required: true
        default: 'v24.10.7'
      profile:
        type: choice
        description: '输入软路由型号，可选值如下：'
        options:
          - friendlyarm_nanopi-r2s
        required: true
        default: 'friendlyarm_nanopi-r2s'
      rootfs_partsize:
        description: '设置软件包大小，单位(MB)'
        required: true
        default: '2048'
      lan_ip:
        description: '设置 LAN IP 地址'
        required: true
        default: '192.168.4.1'
      enable_pppoe:
        description: '是否配置 PPPoE 拨号信息？'
        required: true
        default: 'yes'
        type: choice
        options:
        - 'yes'
        - 'no'
      pppoe_account:
        description: '宽带账号 (若启用PPPoE)'
        required: false
      pppoe_password:
        description: '宽带密码 (若启用PPPoE)'
        required: false
      enable_iptv:
        description: '是否添加 IPTV 接口 (适用湖南电信)'
        required: false
        default: 'yes'
        type: choice
        options:
        - 'yes'
        - 'no'
      iptv_pppoe_account:
        description: 'IPTV账号 (若启用IPTV)'
        required: false
      iptv_pppoe_password:
        description: 'IPTV密码 (若启用IPTV)'
        required: false
      enable_wireguard:
        description: '是否添加 WireGuard 接口'
        required: false
        default: 'yes'
        type: choice
        options:
        - 'yes'
        - 'no'

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Free disk spece
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
      
      - name: Extra cleanup
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/hostedtoolcache
          docker system prune -af || true
          df -h
      
      - name: Set up OpenWRT build environment
        run: |
          sudo apt-get update
          sudo apt-get upgrade
          sudo apt-get install build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
          python3-distutils python3-setuptools python3-pip python3-dev python3-pyelftools \
          rsync swig unzip zlib1g-dev file wget
          sudo apt-get autoclean
          sudo apt-get autoremove
      
      - name: Validate PPPoE、IPTV Inputs
        run: |
          if [[ "${{ inputs.enable_pppoe }}" == "yes" ]]; then
            if [[ -z "${{ inputs.pppoe_account }}" || -z "${{ inputs.pppoe_password }}" ]]; then
              echo "Error: PPPoE account and password must be provided when PPPoE is enabled!"
              exit 1
            fi
          fi
          
          if [[ "${{ inputs.enable_iptv }}" == "yes" ]]; then
            if [[ -z "${{ inputs.iptv_pppoe_account }}" || -z "${{ inputs.iptv_pppoe_password }}" ]]; then
              echo "Error: IPTV account and password must be provided when IPTV is enabled!"
              exit 1
            fi
          fi
      
      - name: Clone OpenWRT source code
        run: |
          CHECKOUT_TAG=${{ inputs.version }}
          git clone --depth 1 --branch $CHECKOUT_TAG --single-branch https://github.com/openwrt/openwrt.git
          echo "Using version: $CHECKOUT_TAG"
      
      # - name: Cache OpenWrt
        # uses: actions/cache@v4
        # with:
          # path: |
            # openwrt/dl
          # key: |
            # openwrt-${{ inputs.version }}-${{ hashFiles('imm/rockchip-r2s/imm.config') }}
          # restore-keys: |
            # openwrt-${{ inputs.version }}-
      
      - name: Customize packages
        run: |
          cd openwrt
          
          git clone https://github.com/stackia/rtp2httpd.git
          cd rtp2httpd
          # 用预生成的 Makefile 替换原始 Makefile（已包含固定版本号、源码下载地址和 PKG_HASH）
          mv openwrt-support/rtp2httpd/Makefile.versioned openwrt-support/rtp2httpd/Makefile
          mv openwrt-support/luci-app-rtp2httpd/Makefile.versioned openwrt-support/luci-app-rtp2httpd/Makefile
          # 将 openwrt-support 目录内容复制到你的 feeds 仓库
          cp -r openwrt-support/* ../package/

          cd ..
          
          git clone --depth=1 --branch master https://github.com/vernesong/OpenClash.git package/luci-app-openclash
          rm -rf package/luci-app-openclash/.git
          
          git clone https://github.com/jerrykuku/luci-theme-argon.git package/luci-theme-argon
          git clone https://github.com/jerrykuku/luci-app-argon-config.git package/luci-app-argon-config
          git clone https://github.com/gdy666/luci-app-lucky.git package/lucky
          cp ${{ github.workspace }}/package/lucky/Makefile package/lucky/lucky/Makefile

          mkdir -p package/hnct-iptv/files/etc/init.d
          mkdir -p package/hnct-iptv/files/etc/hnct-iptv
          mkdir -p package/hnct-iptv/files/etc/uci-defaults
          cp -r ${{ github.workspace }}/conf/rockchip-r2s/hnct-iptv/code/* package/hnct-iptv/files/etc/hnct-iptv/
          cp -r ${{ github.workspace }}/conf/rockchip-r2s/hnct-iptv/init.d/* package/hnct-iptv/files/etc/init.d/
          cp ${{ github.workspace }}/conf/rockchip-r2s/hnct-iptv/Makefile package/hnct-iptv/Makefile
          cp ${{ github.workspace }}/conf/rockchip-r2s/scripts/99-hnct-iptv package/hnct-iptv/files/etc/uci-defaults/99-hnct-iptv
          # pip3 install fastapi uvicorn httpx aiofiles async-lru uvloop httptools
          tar xzf ${{ github.workspace }}/conf/rockchip-r2s/hnct-iptv/hnct-python-modules.tar.gz -C package/hnct-iptv/files/etc/hnct-iptv
          mv package/hnct-iptv/files/etc/hnct-iptv/hnct-python-modules package/hnct-iptv/files/etc/hnct-iptv/python_modules
          chmod +x package/hnct-iptv/files/etc/uci-defaults/99-hnct-iptv
          chmod +x package/hnct-iptv/files/etc/init.d/hnct-iptv
          
          # curl -L https://github.com/immortalwrt/immortalwrt/archive/refs/heads/master.zip -o tmp_packages.zip
          # unzip tmp_packages.zip -d ./tmp_packages
          # mv tmp_packages/immortalwrt-master/package/emortal/cpufreq package
          # rm -rf tmp_packages.zip ./tmp_packages
          # curl -L https://github.com/immortalwrt/packages/archive/refs/heads/master.zip -o tmp_packages.zip
          # unzip tmp_packages.zip -d ./tmp_packages
          # mv tmp_packages/packages-master/net/msd_lite package
          # mv tmp_packages/packages-master/net/vlmcsd package
          # rm -rf tmp_packages.zip ./tmp_packages
          
          # ./scripts/feeds clean
          # ./scripts/feeds update -a
          
          # curl -L https://github.com/immortalwrt/luci/archive/refs/heads/master.zip -o tmp_packages.zip
          # unzip tmp_packages.zip -d ./tmp_packages
          # mv tmp_packages/luci-master/applications/luci-app-msd_lite feeds/luci/applications
          # mv tmp_packages/luci-master/applications/luci-app-vlmcsd feeds/luci/applications
          # mv tmp_packages/luci-master/applications/luci-app-cpufreq feeds/luci/applications
          # mv tmp_packages/luci-master/applications/luci-app-autoreboot feeds/luci/applications
          # mv tmp_packages/luci-master/applications/luci-app-ramfree feeds/luci/applications
          # rm -rf tmp_packages.zip ./tmp_packages
      
      - name: Check hnct-iptv python modules
        run: |
          cd openwrt
          find package/hnct-iptv/files/etc/hnct-iptv/python_modules -maxdepth 1 -type d
      
      - name: Update and install the feeds
        run: |
          cd openwrt
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a
      
      # - name: Check if custom software installed
        # run: |
          # cd openwrt
          # ls -l package/feeds/luci
          # if [ -d "package/feeds/luci/luci-app-openclash" ]; then
            # echo "安装了自定义软件包"
          # else
            # echo "没有安装自定义软件包"
          # fi
      
      # - name: Setup Rust version to 1.85.0
        # run: |
          # cd openwrt
          # 修改 Makefile 中的 Rust 版本号
          # sed -i 's/PKG_VERSION:=1.84.0/PKG_VERSION:=1.85.0/' feeds/packages/lang/rust/Makefile
          # 替换对应的 Rust 1.85 的 SHA256 哈希值
          # sed -i 's/PKG_HASH:=15cee7395b07ffde022060455b3140366ec3a12cbbea8f1ef2ff371a9cca51bf/PKG_HASH:=2f4f3142ffb7c8402139cfa0796e24baaac8b9fd3f96b2deec3b94b4045c6a8a/' feeds/packages/lang/rust/Makefile
      
      - name: Copy pre-existing .config file
        run: |
          cd openwrt
          cp ${{ github.workspace }}/imm/rockchip-r2s/imm.config .config
          make defconfig
      
      - name: Add opkg architecture
        run: |
          cd openwrt
          mkdir -p files/etc/opkg
          cat > files/etc/opkg/arch.conf <<'EOF'
          arch all 1
          arch noarch 1
          arch aarch64_generic 10
          arch aarch64_cortex-a53 5
          EOF
      
      - name: Add Customefeeds conf
        run: |
          cd openwrt
          mkdir -p files/etc/opkg
          cat > files/etc/opkg/customfeeds.conf <<'EOF'
          src/gz istoreos_nas https://istore.istoreos.com/repo/aarch64_cortex-a53/nas
          src/gz istoreos_luci https://istore.istoreos.com/repo/all/nas_luci
          src/gz istoreos_store https://istore.istoreos.com/repo/all/store
          src/gz istoreos_compat https://istore.istoreos.com/repo/all/compat
          src/gz/trusted cooluc_package https://opkg.cooluc.com/openwrt-24.10/aarch64_generic
          EOF
          
          mkdir -p files/etc/opkg/keys
          wget -O files/etc/opkg/keys/istoreos-build.pub https://istore.istoreos.com/repo/key-build.pub
          chmod 0644 files/etc/opkg/keys/istoreos-build.pub
      
      - name: Set lan
        run: |
          # 设置 LAN IP
          cd openwrt
          cat <<EOF > package/base-files/files/etc/uci-defaults/99-set-lan-ip
          uci -q batch <<-EOT >/dev/null 2>&1
          set network.lan.ipaddr='${{ inputs.lan_ip }}'
          # set network.lan.dns='223.5.5.5'
          # add_list network.lan.dns='119.29.29.29'
          commit network
          
          set network.@device[0].igmp_snooping='1'
          # set network.@device[0].query_interval='3000'
          commit network
          EOT
          
          /etc/init.d/network restart >/dev/null 2>&1
          exit 0
          EOF
          chmod +x package/base-files/files/etc/uci-defaults/99-set-lan-ip
      
      - name: Set system
        run: |
          # 设置系统默认配置
          cd openwrt
          cat <<EOF > package/base-files/files/etc/uci-defaults/99-set-system
          uci -q batch <<-EOT >/dev/null 2>&1
          set system.@system[0].timezone='CST-8'
          set system.@system[0].zonename='Asia/Shanghai'
          set system.@timeserver[0].server='ntp1.aliyun.com'
          add_list system.@timeserver[0].server='ntp2.aliyun.com'
          add_list system.@timeserver[0].server='time1.cloud.tencent.com'
          add_list system.@timeserver[0].server='time2.cloud.tencent.com'
          # set system.@system[0].conloglevel='1'
          # set system.@system[0].cronloglevel='9'
          commit system
          EOT
          
          /etc/init.d/system restart >/dev/null 2>&1
          /etc/init.d/sysntpd restart >/dev/null 2>&1
          # /etc/init.d/log restart >/dev/null 2>&1
          # /etc/init.d/cron restart >/dev/null 2>&1
          exit 0
          EOF
          chmod +x package/base-files/files/etc/uci-defaults/99-set-system
      
      - name: Set pppoe
        run: |
          # 设置 PPPoE 用户名、密码以及 IPv6 设置
          cd openwrt
          if [[ "${{ inputs.enable_pppoe }}" == "yes" ]]; then
            cat <<EOF > package/base-files/files/etc/uci-defaults/99-set-wan-pppoe
          uci -q batch <<-EOT >/dev/null 2>&1
          set network.wan.proto='pppoe'
          set network.wan.username='${{ inputs.pppoe_account }}'
          set network.wan.password='${{ inputs.pppoe_password }}'
          set network.wan.ipv6='auto'
          commit network
          EOT
          
          /etc/init.d/network restart >/dev/null 2>&1
          exit 0
          EOF
            chmod +x package/base-files/files/etc/uci-defaults/99-set-wan-pppoe
          fi
      
      - name: Set iptv
        run: |
          # 设置 IPTV 用户名、密码
          cd openwrt
          if [[ "${{ inputs.enable_iptv }}" == "yes" ]]; then
            cat <<EOF > package/base-files/files/etc/uci-defaults/99-set-iptv-interface
          uci -q batch <<-EOT >/dev/null 2>&1
          # 设置 IPTV 接口
          set network.iptv='interface'
          set network.iptv.device='eth2'
          set network.iptv.proto='pppoe'
          set network.iptv.username='${{ inputs.iptv_pppoe_account }}'
          set network.iptv.password='${{ inputs.iptv_pppoe_password }}'
          set network.iptv.defaultroute='0'
          commit network
          
          # 设置 IPTV 防火墙
          set firewall.iptv='zone'
          set firewall.iptv.name='iptv'
          set firewall.iptv.network='iptv'
          set firewall.iptv.input='ACCEPT'
          set firewall.iptv.output='ACCEPT'
          set firewall.iptv.forward='ACCEPT'
          set firewall.iptv.masq='1'
          set firewall.iptv.mtu_fix='1'
          add firewall forwarding
          set firewall.@forwarding[-1].src='lan'
          set firewall.@forwarding[-1].dest='iptv'
          commit firewall
          
          # 添加 IPTV 静态路由
          # add network route
          # set network.@route[-1].interface='iptv'
          # set network.@route[-1].target='10.0.0.0/8'
          
