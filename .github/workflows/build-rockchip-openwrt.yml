          # commit firewall

          # 添加 Web-Proxy-HTTP 规则
          # add firewall rule
          # set firewall.@rule[-1].name='Web-Proxy-HTTP'
          # add_list firewall.@rule[-1].proto='tcp'
          # set firewall.@rule[-1].src='wan'
          # set firewall.@rule[-1].dest_port='8444'
          # set firewall.@rule[-1].target='ACCEPT'
          # commit firewall
          
          # 添加 Lucky 规则
          # add firewall rule
          # set firewall.@rule[-1].name='Lucky'
          # add_list firewall.@rule[-1].proto='tcp'
          # set firewall.@rule[-1].src='wan'
          # set firewall.@rule[-1].dest_port='16601'
          # set firewall.@rule[-1].target='ACCEPT'
          # commit firewall
                  
          # 设置其他防火墙规则
          # set firewall.@defaults[0].input='ACCEPT'
          # set firewall.@defaults[0].flow_offloading='1'
          # commit firewall
          # EOT
          
          # /etc/init.d/firewall reload >/dev/null 2>&1
          # exit 0
          # EOF
          # chmod +x package/base-files/files/etc/uci-defaults/99-set-firewall
      
      # - name: Set DHCP config
        # run: |
          # cd openwrt
          # cat <<EOF > package/base-files/files/etc/uci-defaults/99-set-dhcp
          # uci -q batch <<-EOT >/dev/null 2>&1
          # set dhcp.lan.ra_flags='other-config'
          # commit dhcp
          # EOT
          
          # /etc/init.d/odhcpd restart >/dev/null 2>&1
          # exit 0
