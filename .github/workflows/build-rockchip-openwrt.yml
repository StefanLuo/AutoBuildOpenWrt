          # set network.@route[-1].interface='iptv'
          # set network.@route[-1].target='124.232.131.0/24'
          
          # add network route
          # set network.@route[-1].interface='iptv'
          # set network.@route[-1].target='124.232.135.0/24'
          
          # add network route
          # set network.@route[-1].interface='iptv'
          # set network.@route[-1].target='124.232.231.0/24'
          
          # add network route
          # set network.@route[-1].interface='iptv'
          # set network.@route[-1].target='220.170.28.0/24'
          
          # add network route
          # set network.@route[-1].interface='iptv'
          # set network.@route[-1].target='222.246.132.0/24'
                  
          # add network route
          # set network.@route[-1].interface='iptv'
          # set network.@route[-1].target='224.0.0.0/4'
          
          # commit network
          EOT
          
          /etc/init.d/network restart >/dev/null 2>&1
          /etc/init.d/firewall reload >/dev/null 2>&1
          exit 0
          EOF
            chmod +x package/base-files/files/etc/uci-defaults/99-set-iptv-interface
          fi
      
      - name: Set iptv static route
        run: |
          cd openwrt
          if [[ "${{ inputs.enable_iptv }}" == "yes" ]]; then
            mkdir -p package/base-files/files/etc/hotplug.d/iface
            cp \
            ${{ github.workspace }}/conf/rockchip-r2s/scripts/99-iptv-route \
            package/base-files/files/etc/hotplug.d/iface/99-iptv-route
            chmod 0644 package/base-files/files/etc/hotplug.d/iface/99-iptv-route
          fi
      
      - name: Set wireguard
        run: |
          # 添加 wireguard 接口
          cd openwrt
          if [[ "${{ inputs.enable_wireguard }}" == "yes" ]]; then
            cat <<EOF > package/base-files/files/etc/uci-defaults/99-set-wireguard-interface
          uci -q batch <<-EOT >/dev/null 2>&1
          # 创建 wireguard 接口
          set network.wg='interface'
          set network.wg.proto='wireguard'
          set network.wg.public_key='${{ secrets.WG_HNCT_PUBLIC_KEY }}'
          set network.wg.private_key='${{ secrets.WG_HNCT_PRIVATE_KEY }}'
          set network.wg.addresses='192.168.3.3'
          commit network
          
          # 配置 wireguard 设置
          add network wireguard_wg
          set network.@wireguard_wg[-1].description='OpenWrt_CT'
          set network.@wireguard_wg[-1].public_key='${{ secrets.WG_SERVER_PUBLIC_KEY }}'
          set network.@wireguard_wg[-1].private_key='${{ secrets.WG_SERVER_PRIVATE_KEY }}'
          set network.@wireguard_wg[-1].preshared_key='${{ secrets.WG_HNCT_PRESHARED_KEY }}'
          add_list network.@wireguard_wg[-1].allowed_ips='192.168.2.0/24'
          add_list network.@wireguard_wg[-1].allowed_ips='192.168.3.0/24'
          add_list network.@wireguard_wg[-1].allowed_ips='192.168.5.0/24'
          set network.@wireguard_wg[-1].route_allowed_ips='1'
          set network.@wireguard_wg[-1].endpoint_host='${{ secrets.WG_ENDPOINT_HOST }}'
          set network.@wireguard_wg[-1].endpoint_port='${{ secrets.WG_ENDPOINT_PORT }}'
          set network.@wireguard_wg[-1].persistent_keepalive='25'
          commit network
          
          # 配置防火墙
          add_list firewall.@zone[0].network='wg'
          commit firewall
          EOT
          
          /etc/init.d/network restart >/dev/null 2>&1
          /etc/init.d/firewall reload >/dev/null 2>&1
          exit 0
          EOF
            chmod +x package/base-files/files/etc/uci-defaults/99-set-wireguard-interface
          fi
      
      # - name: Add firewall rules
        # run: |
          # cd openwrt
          # cat <<EOF > package/base-files/files/etc/uci-defaults/99-set-firewall
          # uci -q batch <<-EOT >/dev/null 2>&1
