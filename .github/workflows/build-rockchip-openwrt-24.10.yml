name: build-rockchip-openwrt-24.10

on:
  workflow_dispatch:
    inputs:
      profile:
        type: choice
        description: '输入软路由型号，可选值如下：'
        options:
          - friendlyarm_nanopi-r2s
        required: true
        default: 'friendlyarm_nanopi-r2s'
      rootfs_partsize:
        description: '设置软件包大小，单位(MB)'
        required: true
        default: '1024'
      lan_ip:
        description: '设置 LAN IP 地址'
        required: true
        default: '192.168.4.1'
      enable_pppoe:
        description: '是否配置 PPPoE 拨号信息？'
        required: true
        default: 'yes'
        type: choice
        options:
        - 'yes'
        - 'no'
      pppoe_account:
        description: '宽带账号 (若启用PPPoE)'
        required: false
      pppoe_password:
        description: '宽带密码 (若启用PPPoE)'
        required: false
      enable_wireguard:
        description: '是否添加 WireGuard 接口'
        required: false
        default: 'yes'
        type: choice
        options:
        - 'yes'
        - 'no'

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Free disk spece
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
      
      - name: Set up OpenWRT build environment
        run: |
          sudo apt-get update
          sudo apt-get upgrade
          sudo apt-get install build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
          python3-distutils python3-setuptools python3-pip python3-dev python3-pyelftools \
          rsync swig unzip zlib1g-dev file wget
          sudo apt-get autoclean
          sudo apt-get autoremove
      
      - name: Validate PPPoE Inputs
        run: |
          if [[ "${{ inputs.enable_pppoe }}" == "yes" ]]; then
            if [[ -z "${{ inputs.pppoe_account }}" || -z "${{ inputs.pppoe_password }}" ]]; then
              echo "Error: PPPoE account and password must be provided when PPPoE is enabled!"
              exit 1
            fi
          fi
      
      - name: Clone OpenWRT source code
        run: |
          git clone https://git.openwrt.org/openwrt/openwrt.git
          cd openwrt
          git pull
          git checkout v24.10.0
      
      - name: Customize seeds
        run: |
          cd openwrt
          cat >> feeds.conf.default <<EOF
          src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall.git;main
          src-git passwall https://github.com/xiaorouji/openwrt-passwall-packages.git;main
          EOF
          
          git clone https://github.com/jerrykuku/luci-theme-argon.git package/luci-theme-argon
          git clone https://github.com/jerrykuku/luci-app-argon-config.git package/luci-app-argon-config
          git clone https://github.com/gdy666/luci-app-lucky.git package/lucky
      
      - name: Update and install the feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
      
      - name: Conform the feeds
        run: |
          cd openwrt
          ./scripts/feeds install -a
      
      - name: Setup Rust version to 1.85.0
        run: |
          cd openwrt
          # 修改 Makefile 中的 Rust 版本号
          sed -i 's/PKG_VERSION:=1.84.0/PKG_VERSION:=1.85.0/' feeds/packages/lang/rust/Makefile
          # 替换对应的 Rust 1.85 的 SHA256 哈希值
          sed -i 's/PKG_HASH:=15cee7395b07ffde022060455b3140366ec3a12cbbea8f1ef2ff371a9cca51bf/PKG_HASH:=2f4f3142ffb7c8402139cfa0796e24baaac8b9fd3f96b2deec3b94b4045c6a8a/' feeds/packages/lang/rust/Makefile
      
      - name: Copy pre-existing .config file
        run: |
          cd openwrt
          cp ${{ github.workspace }}/imm/rockchip-r2s/imm.config .config
          # yes | make oldconfig
          
      - name: Set wireguard
        run: |
          # 添加 wireguard 接口
          cd openwrt
          if [[ "${{ inputs.enable_wireguard }}" == "yes" ]]; then
            cat <<EOF > package/base-files/files/etc/uci-defaults/99-set-wireguard-interface
          uci -q batch <<-EOT >/dev/null 2>&1
          # 创建 wireguard 接口
          set network.wg='interface'
          set network.wg.proto='wireguard'
          set network.wg.private_key='${{ secrets.WG_HNCT_PRIVATE_KEY }}'
          set network.wg.addresses='192.168.3.3'
          commit network
                  
          # 配置 wireguard 设置
          add network wireguard_wg
          set network.@wireguard_wg[-1].description='OpenWrt_CU'
          set network.@wireguard_wg[-1].public_key='${{ secrets.WG_SHCU_PUBLIC_KEY }}'
          set network.@wireguard_wg[-1].private_key='${{ secrets.WG_SHCU_PRIVATE_KEY }}'
          set network.@wireguard_wg[-1].preshared_key='${{ secrets.WG_HNCT_PRESHARED_KEY }}'
          add_list network.@wireguard_wg[-1].allowed_ips='192.168.2.0/24'
          add_list network.@wireguard_wg[-1].allowed_ips='192.168.3.0/24'
          add_list network.@wireguard_wg[-1].allowed_ips='192.168.5.0/24'
          set network.@wireguard_wg[-1].route_allowed_ips='1'
          set network.@wireguard_wg[-1].endpoint_host='${{ secrets.WG_ENDPOINT_HOST }}'
          set network.@wireguard_wg[-1].endpoint_port='${{ secrets.WG_ENDPOINT_PORT }}'
          set network.@wireguard_wg[-1].persistent_keepalive='25'
          commit network
                  
          # 配置防火墙
          add_list firewall.@zone[0].network='wg'
          commit firewall
          EOT
          
          /etc/init.d/network restart >/dev/null 2>&1
          /etc/init.d/firewall reload >/dev/null 2>&1
          exit 0
          EOF
            chmod +x package/base-files/files/etc/uci-defaults/99-set-wireguard-interface
          fi
      
      - name: Add firewall rules
        run: |
          cd openwrt
          cat <<EOF > package/base-files/files/etc/uci-defaults/99-set-firewall
          uci -q batch <<-EOT >/dev/null 2>&1
                  # 添加 Web-Proxy-HTTPS 规则
                  add firewall rule
                  set firewall.@rule[-1].name='Web-Proxy-HTTPS'
                  add_list firewall.@rule[-1].proto='tcp'
                  set firewall.@rule[-1].src='wan'
                  set firewall.@rule[-1].dest_port='8443'
                  set firewall.@rule[-1].target='ACCEPT'
                  commit firewall
                  
                  # 添加 Lucky 规则
                  add firewall rule
                  set firewall.@rule[-1].name='Lucky'
                  add_list firewall.@rule[-1].proto='tcp'
                  set firewall.@rule[-1].src='wan'
                  set firewall.@rule[-1].dest_port='16601'
                  set firewall.@rule[-1].target='ACCEPT'
                  commit firewall
                  
                  # 设置其他防火墙规则
                  set firewall.@defaults[0].input='ACCEPT'
                  set firewall.@defaults[0].flow_offloading='1'
                  commit firewall
          EOT
          
          /etc/init.d/firewall reload >/dev/null 2>&1
          exit 0
          EOF
          chmod +x package/base-files/files/etc/uci-defaults/99-set-firewall

      - name: Set install flask_cors
        run: |
          cd openwrt
          cat <<EOF > package/base-files/files/etc/uci-defaults/99-install-flask-cors
          pip install flask_cors
          exit 0
          EOF
          chmod +x package/base-files/files/etc/uci-defaults/99-install-flask-cors
      
      - name: Set LAN IP and PPPoE credentials
        run: |
          # 修改 network 配置文件中的 LAN IP
          cd openwrt
          # sed -i 's/192.168.1.1/${{ inputs.lan_ip }}/g' package/base-files/files/bin/config_generate
          # echo "lan_ip: ${{ inputs.lan_ip }}"
          # 配置 WAN 接口为 PPPoE，并添加用户名和密码
          # if [[ "${{ inputs.enable_pppoe }}" == "yes" ]]; then
            # sed -i 's/"${2:-dhcp}"/"${2:-pppoe}"/g' package/base-files/files/lib/functions/uci-defaults.sh
            # sed -i "s/username='username'/username='${{ inputs.pppoe_account }}'/g" package/base-files/files/bin/config_generate
            # sed -i "s/password='password'/password='${{ inputs.pppoe_password }}'/g" package/base-files/files/bin/config_generate
            # echo "pppoe_account: '${{ inputs.pppoe_account }}'"
            # echo "pppoe_password: '${{ inputs.pppoe_password }}'"
          # fi
      
      - name: Set root filesystem size
        run: |
          # 更新 CONFIG_TARGET_ROOTFS_PARTSIZE 配置
          cd openwrt
          sed -i "/CONFIG_TARGET_ROOTFS_PARTSIZE/d" .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=${{ inputs.rootfs_partsize }}" >> .config
          echo "rootfs_partsize: ${{ inputs.rootfs_partsize }}"
      
      - name: Copy software config files
        run: |
          cd openwrt
          mkdir -p files/etc
          # mkdir -p files/etc/crontabs
          # mkdir -p files/www
          
          if [[ "${{ inputs.profile }}" == "friendlyarm_nanopi-r2s" ]]; then
            # cp -r ${{ github.workspace }}/crontabs/* files/etc/crontabs/
            cp -r ${{ github.workspace }}/conf/rockchip-r2s/etc/* files/etc/
            # cp -r ${{ github.workspace }}/www/* files/www/
          fi
      
      - name: Building Rockchip OpenWrt
        run: |
          cd openwrt
          make download -j$(nproc)
          make -j1 V=s
      
      - name: Generate Firmware SHA-256
        run: |
          cp ${{ github.workspace }}/openwrt/bin/targets/rockchip/armv8/*.img.gz ${{ github.workspace }}
          for file in *.img.gz; do
            sha256sum "$file" > "$file.sha256"
            sha256sum -c "$file.sha256"
          done
      
      - name: Upload OpenWrt as release assets
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: rockchip
          name: OpenWrt-Rockchip
          body_path: ${{ github.workspace }}/info.md
          files: |
            ${{ github.workspace }}/*.img.gz
            ${{ github.workspace }}/*.sha256
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
